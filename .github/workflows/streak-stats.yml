name: Update Streak Stats

on:
  schedule:
    - cron: '0 */4 * * *' # Runs every 4 hours
  push:
    branches:
      - main
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Streak Stats SVG
        uses: be-next/github-streak-stats-action@v1
        with:
          username: utkarsh-aix
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: dark
          background: "0D1117"
          ring: "00FFA3"
          fire: "7B61FF"
          currStreakLabel: "00FFA3"
          stroke: "7B61FF"
          currStreakNum: "FEFEFE"
          sideNums: "FEFEFE"
          sideLabels: "FEFEFE"
          dates: "9E9E9E"
          output-path: github-streak-stats.svg

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-streak-stats.svg
          git commit -m "chore: update streak stats SVG [skip ci]" || exit 0
          git push origin main
